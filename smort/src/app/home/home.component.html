<vg-player (onPlayerReady)="OnPlayerReady($event)">
  <vg-overlay-play></vg-overlay-play>
  <vg-buffering vgFor="currentVideo"></vg-buffering>
  <vg-scrub-bar>
    <vg-scrub-bar-current-time></vg-scrub-bar-current-time>
    <vg-scrub-bar-buffering-time></vg-scrub-bar-buffering-time>
  </vg-scrub-bar>
  <vg-controls>
    <div class="video-information">
      <img src="{{ profiles[0].ImageUrl }}" />
      <span class="video-title">title</span>
      <span class="video-likes">666</span>
    </div>
    <vg-scrub-bar style="pointer-events: none"></vg-scrub-bar>
    <vg-time-display vgProperty="left" vgFormat="mm:ss"></vg-time-display>
  </vg-controls>

  <video [vgMedia]="$any(media)" #media id="currentVideo" preload="auto">
    <source [src]="currentVideo.url" type="video/mp4" />
  </video>
</vg-player>
<div class="video-overlay">
  <div class="video-buttons">
    <button>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24 ">

        />
      </svg>
    </button>
    <button>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24 ">
        <path
          d="M19,15H23V3H19M15,3H6C5.17,3 4.46,3.5 4.16,4.22L1.14,11.27C1.05,11.5 1,11.74 1,12V14A2,2 0 0,0 3,16H9.31L8.36,20.57C8.34,20.67 8.33,20.77 8.33,20.88C8.33,21.3 8.5,21.67 8.77,21.94L9.83,23L16.41,16.41C16.78,16.05 17,15.55 17,15V5C17,3.89 16.1,3 15,3Z"
        />

    </button>
    <button>

        />
      </svg>
    </button>
  </div>
  <div class="navigation">
    <button aria-label="Search">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24 ">

          d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"
        />
      </svg>
    </button>
    <button>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24 ">
        <path d="M9,16V10H5L12,3L19,10H15V16H9M5,20V18H19V20H5Z" />
      </svg>
    </button>
