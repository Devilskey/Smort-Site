<form>
  <div class="custom-form">
    <div class="form-left">
      <label for="UserName">UserName: </label>
      <br />
      <label for="Email">Email: </label>
      <br />
      <label for="Password">Password: </label>
      <br />
      <label for="ProfilePicture">ProfilePicture: </label>
      <br />
      <label for="FollowerTitle">FollowerTitle: </label>
      <br />
      <label for="EmailNotiffications">Email notiffications: </label>
    </div>
    <div class="form-right">
      <input
        id="UserName"
        type="text"
        [(ngModel)]="UserName"
        name="UserName"
        placeholder="Username"
      />
      <br />
      <input
        id="Email"
        type="text"
        [(ngModel)]="Email"
        name="Email"
        placeholder="Email address"
      />
      <br />
      <input
        id="Password"
        type="text"
        [(ngModel)]="Password"
        name="Password"
        placeholder="Password"
      />
      <br />
      <input
        id="ProfilePicture"
        type="file"
        class="file-upload"
        [(ngModel)]="ProfilePicture"
        name="ProfilePicture"
      />
      <br />
      <input
        id="FollowerTitle"
        type="text"
        [(ngModel)]="FollowerTitle"
        name="FollowerTitle"
        placeholder="FollowerTitle"
      />
      <br />
      <input
        id="EmailNotiffications"
        type="checkbox"
        [(ngModel)]="EmailNotiffications"
        name="EmailNotiffications"
        checked="checked"
      />
    </div>
  </div>

  <button class="form-button" type="submit" (click)="SaveSettings()">
    Save
  </button>
</form>
